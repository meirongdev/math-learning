<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SG Math Tutor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --app-font-stack: "Noto Sans SC", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Heiti SC", sans-serif;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: var(--app-font-stack);
            background: #f8fafe;
        }

        #root {
            width: 100%;
            height: 100%;
            position: relative;
            font-family: var(--app-font-stack);
        }

        canvas,
        input,
        textarea,
        button,
        select {
            font-family: var(--app-font-stack);
        }

        /* Help Compose Wasm place and render the hidden/native backing text input correctly. */
        #root input,
        #root textarea {
            font-size: 16px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="ocr-helper.js"></script>
    <script src="webApp.js"></script>
</body>
</html>
