name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: mathlearning
          POSTGRES_USER: mathlearning
          POSTGRES_PASSWORD: mathlearning
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mathlearning"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build

      - name: Test
        run: ./gradlew test
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/mathlearning
          SPRING_DATASOURCE_USERNAME: mathlearning
          SPRING_DATASOURCE_PASSWORD: mathlearning
          SPRING_DATA_REDIS_HOST: localhost

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: backend/build/reports/tests/

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build

      - name: Test shared module
        run: ./gradlew :shared:wasmJsBrowserTest

      - name: Build distribution
        run: ./gradlew :webApp:wasmJsBrowserDistribution

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-reports
          path: frontend/build/reports/tests/

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f infra/backend.Dockerfile -t math-learning-backend backend
