server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
    async:
      timeout: 300000

app:
  llm:
    timeout-seconds: 180
  jwt:
    secret: ${JWT_SECRET:default-dev-secret-key-must-be-at-least-32-bytes-long!}
    expiration-seconds: 86400
  semantic-cache:
    enabled: true

spring:
  application:
    name: math-learning-backend

  # Enable Virtual Threads (Project Loom)
  threads:
    virtual:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    com.mathlearning: DEBUG
    org.springframework.ai: DEBUG
