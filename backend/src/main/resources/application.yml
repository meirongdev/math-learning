server:
  port: 8080

spring:
  application:
    name: math-learning-backend

  # Enable Virtual Threads (Project Loom)
  threads:
    virtual:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    com.mathlearning: DEBUG
    org.springframework.ai: DEBUG
