apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "math-learning.fullname" . }}-backend
  labels:
    {{- include "math-learning.labels" . | nindent 4 }}
    {{- include "math-learning.backend.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      {{- include "math-learning.backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "math-learning.backend.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: {{ .Values.backend.config.springProfilesActive | quote }}
            - name: SPRING_DATASOURCE_URL
              value: {{ .Values.backend.config.datasourceUrl | quote }}
            - name: SPRING_DATASOURCE_USERNAME
              value: {{ .Values.backend.config.datasourceUsername | quote }}
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.existingSecret }}
                  key: datasource-password
            - name: SPRING_DATA_REDIS_HOST
              value: {{ .Values.backend.config.redisHost | quote }}
            - name: SPRING_DATA_REDIS_PORT
              value: {{ .Values.backend.config.redisPort | quote }}
            - name: SPRING_AI_OLLAMA_BASE_URL
              value: {{ .Values.backend.config.ollamaBaseUrl | quote }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.existingSecret }}
                  key: jwt-secret
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
